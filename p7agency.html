        :root {
            --bg-primary: #0a0a0a;
            --text-primary: #f0f0f0;
            --text-muted: #7a7a7a;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            cursor: crosshair;
            -webkit-font-smoothing: antialiased;
        }
        .font-condensed {
            font-family: 'Archivo Narrow', sans-serif;
            letter-spacing: -0.06em;
            line-height: 0.82;
        }
        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }
        ::selection {
            background-color: var(--text-primary);
            color: var(--bg-primary);
        }
        .stardust {
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #222;
        }

        /* Level Timeline Styles */
        @keyframes levelPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(240, 240, 240, 0.3); }
            50% { box-shadow: 0 0 20px 6px rgba(240, 240, 240, 0.08); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes drawLine {
            from { height: 0; }
            to { height: 100%; }
        }
        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        .level-card {
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .level-card:hover {
            transform: translateX(12px);
        }
        .level-card:hover .level-number {
            transform: scale(1.15);
            background: var(--text-primary);
            color: var(--bg-primary);
        }
        .level-card:hover .level-line {
            background: var(--text-primary);
            width: 80px;
        }
        .level-card:hover .level-content {
            border-color: rgba(240, 240, 240, 0.3);
        }
        .level-card:hover .level-desc {
            color: var(--text-primary);
        }
        .level-number {
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .level-line {
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .level-content {
            transition: all 0.5s ease;
        }
        .level-desc {
            transition: color 0.5s ease;
        }
        .level-active .level-number {
            animation: levelPulse 2.5s ease-in-out infinite;
        }

        /* Progress bar animation */
        .progress-track {
            position: relative;
            overflow: hidden;
        }
        .progress-track::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(240,240,240,0.1), transparent);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            100% { left: 100%; }
        }

        /* CTA glow */
        @keyframes ctaGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(240,240,240,0.05); }
            50% { box-shadow: 0 0 40px rgba(240,240,240,0.15), 0 0 80px rgba(240,240,240,0.05); }
        }
    </style>
</head>

        const Services = () => {

                { id: '02', title: 'MOV7', desc: 'Uma assessoria completa onde entramos em todos os pilares do seu projeto para construir crescimento de verdade. Trabalhamos no branding, posicionamento, conteúdo, produtos, ofertas e funil de vendas de forma integrada. Um plano organizado para o crescimento do seu projeto no ambiente digital.' }

                <section id="produtos" className="py-24 md:py-40 px-6 md:px-16 bg-[#0a0a0a] text-[#f0f0f0] border-b border-[#f0f0f0]/10 relative overflow-hidden">
                    <div className="max-w-7xl mx-auto">
                        <h2 className="text-6xl md:text-8xl font-condensed uppercase leading-[0.8] mb-24 md:mb-48">Produtos<br />&amp; Soluções</h2>
                        <div className="flex flex-col">
                            {list.map((s) => (
                                <div key={s.id} className="group border-b border-[#f0f0f0]/10 py-24 flex flex-col lg:flex-row justify-between items-start lg:items-center hover:px-20 hover:bg-[#f0f0f0]/5 transition-all duration-700 relative overflow-hidden">

        /* ========== LEVELS SECTION — Interactive & Dynamic ========== */
        const Levels = () => {
            const [activeLevel, setActiveLevel] = useState(null);
            const [visibleLevels, setVisibleLevels] = useState([]);
            const sectionRef = useRef(null);

            const levels = [
                {
                    num: 0,
                    title: "O Início da Jornada",
                    desc: "Você é um profissional com desejo de construir uma marca que transmita autoridade, valor e autenticidade. Acumula conhecimento, mas ainda não construiu o que deseja."
                },
                {
                    num: 1,
                    title: "Clareza no Posicionamento",
                    desc: "Você construiu clareza no posicionamento e agora sabe o que entrega e para quem entrega. Isso está claro para você e para seu cliente. Dessa forma, você atrai o cliente certo e se torna autêntico no mercado."
                },
                {
                    num: 2,
                    title: "Digital como Ativo",
                    desc: "O digital está se tornando um ativo em seu negócio. Você está aparecendo mais para seu cliente ideal e está construindo um relacionamento de conexão com ele. Agora, você se torna a primeira opção na mente dele. Esse cliente sabe que precisa de você."
                },
                {
                    num: 3,
                    title: "Consolidação Digital",
                    desc: "Seu projeto se consolidou no digital. Agora você está construindo produtos que resolvam a dor e o desejo real do seu cliente, porque agora você aprendeu a ouvir ele. Você o entende e sabe o que ele realmente precisa."
                },
                {
                    num: 4,
                    title: "Escala",
                    desc: "Chegou a hora de escalar. Seus produtos já foram validados e muitas pessoas estão sendo transformadas através dele. Você precisa entender formas de atingir mais pessoas para gerar mais resultado."
                },
                {
                    num: 5,
                    title: "Comunidade",
                    desc: "Seu cliente merece o melhor. Aqui ele está apaixonado em seu projeto e você começa a construir uma comunidade fiel aos princípios, valores e rituais da sua marca. Você está trabalhando para que ele se sinta pertencente a esse movimento e nunca mais queira sair."
                },
                {
                    num: 6,
                    title: "Gestão & Solidez",
                    desc: "Você precisa administrar melhor o crescimento do seu negócio. Aqui você está entendendo como melhorar a gestão, reduzir custos, aumentar a qualidade, elevar ROI e construir um negócio com solidez."
                },
                {
                    num: 7,
                    title: "Excelência Máxima",
                    desc: "Em toda cultura, em toda tradição, o 7 representa o ciclo completo. A perfeição. O que foi levado até o fim com excelência. Você atingiu o nível máximo de seu negócio e agora construiu uma marca com excelência, autenticidade e valor."
                }
            ];

                const observer = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((entry) => {
                            if (entry.isIntersecting) {
                                const idx = parseInt(entry.target.dataset.level);
                                setVisibleLevels(prev => {
                                    if (!prev.includes(idx)) return [...prev, idx];
                                    return prev;
                                });
                            }
                        });
                    },
                    { threshold: 0.15, rootMargin: '0px 0px -50px 0px' }

                const cards = document.querySelectorAll('.level-observe');

                return () => observer.disconnect();

                            </h2>
                            <p className="text-lg md:text-xl text-[#7a7a7a] max-w-3xl mx-auto font-light leading-relaxed">

                                <div 
                                    className="absolute top-0 left-0 h-full bg-gradient-to-r from-[#7a7a7a] to-[#f0f0f0] rounded-full transition-all duration-1000 ease-out"

                                ></div>
                                {levels.map((level) => (
                                    <button
                                        key={level.num}
                                        onClick={() => setActiveLevel(activeLevel === level.num ? null : level.num)}
                                        className={`absolute top-1/2 -translate-y-1/2 w-8 h-8 rounded-full border-2 flex items-center justify-center text-[10px] font-black transition-all duration-500 cursor-pointer ${
                                            activeLevel === level.num 
                                                ? 'bg-[#f0f0f0] text-[#0a0a0a] border-[#f0f0f0] scale-125' 
                                                : activeLevel !== null && level.num <= activeLevel
                                                    ? 'bg-[#7a7a7a] text-[#0a0a0a] border-[#7a7a7a]'
                                                    : 'bg-[#0a0a0a] text-[#7a7a7a] border-[#7a7a7a]/30 hover:border-[#f0f0f0]/50 hover:scale-110'
                                        }`}
                                        style={{ left: `${(level.num / 7) * 100}%`, transform: `translateX(-50%) translateY(-50%) ${activeLevel === level.num ? 'scale(1.25)' : ''}` }}

                            {/* Vertical timeline line (mobile/tablet) */}

                            <div className="space-y-4 md:space-y-6">
                                {levels.map((level, index) => {
                                    const isVisible = visibleLevels.includes(index);
                                    const isActive = activeLevel === level.num;
                                    const isLast = level.num === 7;

                                    return (
                                        <div
                                            key={level.num}
                                            data-level={index}
                                            className={`level-observe level-card flex items-start gap-6 md:gap-10 cursor-pointer ${isActive ? 'level-active' : ''}`}

                                                opacity: isVisible ? 1 : 0,
                                                transform: isVisible ? 'translateY(0)' : 'translateY(30px)',

                                                    : isLast 
                                                        ? 'border-[#f0f0f0]/40 text-[#f0f0f0]/60' 
                                                        : 'border-[#7a7a7a]/30 text-[#7a7a7a]'
                                            }`}>
                                                {level.num}
                                            </div>

                                            {/* Level Content */}
                                            <div className={`level-content flex-1 border ${isActive ? 'border-[#f0f0f0]/20 bg-[#f0f0f0]/[0.03]' : isLast ? 'border-[#f0f0f0]/10' : 'border-[#f0f0f0]/5'} rounded-none p-6 md:p-8 lg:p-10 relative overflow-hidden group`}>
                                                {/* Decorative corner */}
                                                {isLast && (
                                                    <div className="absolute top-0 right-0 w-16 h-16">
                                                        <div className="absolute top-0 right-0 w-full h-full border-t border-r border-[#f0f0f0]/20"></div>
                                                        <div className="absolute top-2 right-2 text-[8px] font-black tracking-[0.3em] text-[#f0f0f0]/20 uppercase">Max</div>
                                                    </div>
                                                )}

                                                <div className="flex flex-col md:flex-row md:items-start md:justify-between gap-4 md:gap-12">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-4 mb-3">
                                                            <span className="text-[10px] font-black uppercase tracking-[0.5em] text-[#7a7a7a]">Level {level.num}</span>
                                                            <div className={`level-line h-[1px] bg-[#7a7a7a]/30 ${isActive ? '!w-20 !bg-[#f0f0f0]' : 'w-10'}`}></div>
                                                            {isLast && <span className="text-[9px] font-black uppercase tracking-[0.4em] text-[#f0f0f0]/30 border border-[#f0f0f0]/10 px-3 py-1">Ciclo Completo</span>}
                                                        </div>
                                                        <h3 className={`text-2xl md:text-3xl lg:text-4xl font-condensed uppercase tracking-tighter mb-4 transition-colors duration-500 ${isActive ? 'text-[#f0f0f0]' : isLast ? 'text-[#f0f0f0]/80' : 'text-[#f0f0f0]/70'}`}>
                                                            {level.title}
                                                        </h3>
                                                    </div>
                                                </div>

                                                {/* Expandable description */}
                                                <div 
                                                    className="overflow-hidden transition-all duration-700 ease-[cubic-bezier(0.23,1,0.32,1)]"
                                                    style={{ 
                                                        maxHeight: isActive ? '300px' : '0px',
                                                        opacity: isActive ? 1 : 0,
                                                        marginTop: isActive ? '16px' : '0px'
                                                    }}
                                                >
                                                    <div className="border-t border-[#f0f0f0]/10 pt-6">
                                                        <p className="level-desc text-base md:text-lg text-[#7a7a7a] leading-relaxed font-light max-w-3xl">
                                                            {level.desc}
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    );

                                </p>
                            </div>
                            <a 
                                href="https://forms.gle/JBhzytiUhuHGVzNz7" 
                                target="_blank"
                                className="inline-flex items-center gap-8 bg-[#f0f0f0] text-[#0a0a0a] px-12 md:px-16 py-6 md:py-7 rounded-full font-black uppercase text-[11px] md:text-[12px] tracking-[0.4em] transition-all duration-700 hover:scale-105 active:scale-95 group"

                                <span>QUERO SUBIR DE LEVEL</span>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="group-hover:translate-x-2 group-hover:-translate-y-1 transition-transform duration-500">
                                    <path d="M7 17L17 7M17 7H7M17 7V17"/>
                                </svg>
                            </a>
                        </div>
                    </div>
                </section>
            );
        };


        const Expertise = () => {
            const deliverables = [
                { id: "01", title: "No Posicionamento", items: ["Clareza de proposta de valor", "Definição de persona e diferenciais", "Estrutura de comunicação, narrativa e pilares da marca"] },
                { id: "02", title: "No Conteúdo", items: ["Linha editorial definida", "Roteiros e estrutura de conteúdo", "Edição, postagens e análise de métricas"] },
                { id: "03", title: "No Branding", items: ["Identidade visual alinhada", "Direção criativa de imagem e vídeos", "Padrão estético da marca"] },
                { id: "04", title: "Nos Produtos / Ofertas", items: ["Estrutura de ofertas organizada", "Clareza na proposta de valor", "Argumentos de venda definidos"] },

                                <div key={item.id} className={`group border border-[#f0f0f0]/10 p-8 md:p-12 hover:bg-[#f0f0f0] hover:text-[#0a0a0a] transition-all duration-700 cursor-default flex flex-col ${index < 3 ? 'lg:col-span-2' : 'lg:col-span-3'} ${index === 4 ? 'sm:col-span-2 lg:col-span-3' : ''}`}>

                                        {item.items.map((bullet, idx) => (
                                            <li key={idx} className="text-sm font-medium leading-relaxed flex items-start gap-3">
                                                <span className="mt-1.5 w-1.5 h-1.5 rounded-full bg-current opacity-50 flex-shrink-0"></span>
                                                <span>{bullet}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const App = () => (
            <div className="min-h-screen">
                <Header />
                <main>
                    <Hero />
                    <About />
                    <ForWhom />
                    <Projects />
                    <AboutPedro />
                    <Testimonials />
                    <Levels />
                    <Services />
                    <Expertise />
                </main>
                <footer className="py-24 md:py-32 px-6 md:px-16 border-t border-[#f0f0f0]/10 bg-[#0a0a0a] text-center">
                    <div className="flex flex-col items-center mb-12 opacity-40">
                        <img src="./P7.png" alt="P7" className="h-[60px] w-auto object-contain invert" />
                    </div>
                    <div className="flex gap-8 justify-center mb-8">
                        <a href="https://www.instagram.com/p7.agency/" target="_blank" className="text-[10px] uppercase tracking-widest font-black opacity-30 hover:opacity-100 transition-opacity">Instagram</a>
                        <a href="https://forms.gle/JBhzytiUhuHGVzNz7" target="_blank" className="text-[10px] uppercase tracking-widest font-black opacity-30 hover:opacity-100 transition-opacity">WhatsApp</a>
                        <a href="https://www.linkedin.com/in/pedropoubel7/" target="_blank" className="text-[10px] uppercase tracking-widest font-black opacity-30 hover:opacity-100 transition-opacity">LinkedIn</a>
                    </div>
                    <p className="text-[12px] uppercase tracking-[0.7em] font-black opacity-30">© 2026 P7 — POSICIONAMENTO DIGITAL</p>
                </footer>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
